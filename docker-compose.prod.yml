version: "3.9"

# Production override for docker-compose.yml
# Usage (Coolify): set "Compose Override File" to docker-compose.prod.yml
# Usage (manual):  docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  db:
    ports: [] # do not expose PostgreSQL publicly

  backend:
    volumes: [] # no dev hot-reload mount in production
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8001 --workers 2
    environment:
      APP_ENV: production
      CORS_ORIGINS: https://memo.nouhlab.com
