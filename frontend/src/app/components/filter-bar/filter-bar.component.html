<div style="padding: 8px 12px; overflow-x: auto; white-space: nowrap; display: flex; gap: 8px; align-items: center; border-bottom: 1px solid var(--ion-color-step-100);">

  <!-- Content type filter -->
  <ion-select
    [(ngModel)]="selectedType"
    (ionChange)="onTypeChange()"
    placeholder="All types"
    style="min-width: 110px; font-size: 0.85rem;"
    interface="popover"
  >
    <ion-select-option value="">All types</ion-select-option>
    <ion-select-option value="youtube">YouTube</ion-select-option>
    <ion-select-option value="instagram">Instagram</ion-select-option>
    <ion-select-option value="article">Article</ion-select-option>
    <ion-select-option value="link">Link</ion-select-option>
  </ion-select>

  <!-- Tag chips -->
  <ion-chip
    *ngFor="let tag of allTags.slice(0, 15)"
    [outline]="!isTagSelected(tag)"
    [color]="isTagSelected(tag) ? 'primary' : 'medium'"
    (click)="toggleTag(tag)"
    style="flex-shrink: 0; font-size: 0.75rem;"
  >
    <ion-label>{{ tag }}</ion-label>
    <ion-icon *ngIf="isTagSelected(tag)" name="close"></ion-icon>
  </ion-chip>

</div>
