<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ item?.title || 'Item' }}</ion-title>
    <ion-buttons slot="end">
      <ion-button *ngIf="!isEditing && item" (click)="startEdit()" fill="clear">
        <ion-icon slot="icon-only" name="create"></ion-icon>
      </ion-button>
      <ion-button *ngIf="!isEditing && item" (click)="confirmDelete()" fill="clear" color="danger">
        <ion-icon slot="icon-only" name="trash"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <div *ngIf="isLoading" style="display: flex; justify-content: center; padding: 64px;">
    <ion-spinner></ion-spinner>
  </div>

  <div *ngIf="item && !isLoading">

    <!-- Thumbnail -->
    <img
      *ngIf="item.thumbnail_url"
      [src]="item.thumbnail_url"
      alt="thumbnail"
      style="width: 100%; max-height: 240px; object-fit: cover; border-radius: 12px; margin-bottom: 16px;"
    />

    <!-- View mode -->
    <div *ngIf="!isEditing">
      <div style="display: flex; gap: 8px; align-items: center; margin-bottom: 8px;">
        <ion-chip [outline]="true" style="font-size: 0.75rem;">{{ item.content_type }}</ion-chip>
        <span style="font-size: 0.8rem; color: var(--ion-color-medium);">
          {{ item.created_at | date:'medium' }}
        </span>
      </div>

      <h2 style="font-size: 1.2rem; font-weight: 700; margin: 0 0 12px; line-height: 1.4;">
        {{ item.title }}
      </h2>

      <p *ngIf="item.summary" style="font-size: 0.95rem; line-height: 1.6; color: var(--ion-color-medium-shade); margin-bottom: 16px;">
        {{ item.summary }}
      </p>

      <div style="display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 24px;">
        <ion-chip *ngFor="let tag of item.tags" [outline]="true" class="tag-chip">
          <ion-label>{{ tag }}</ion-label>
        </ion-chip>
      </div>

      <ion-button expand="block" (click)="openUrl()">
        <ion-icon slot="start" name="open-outline"></ion-icon>
        Open URL
      </ion-button>
    </div>

    <!-- Edit mode -->
    <div *ngIf="isEditing">
      <ion-item>
        <ion-label position="stacked">Title</ion-label>
        <ion-input [(ngModel)]="editTitle"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">Summary</ion-label>
        <ion-textarea [(ngModel)]="editSummary" [autoGrow]="true" rows="4"></ion-textarea>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">Add tag</ion-label>
        <ion-input [(ngModel)]="newTag" placeholder="Type tag and press Enter" (keyup.enter)="addTag()"></ion-input>
        <ion-button slot="end" fill="clear" (click)="addTag()">
          <ion-icon slot="icon-only" name="add"></ion-icon>
        </ion-button>
      </ion-item>

      <div style="display: flex; flex-wrap: wrap; gap: 6px; padding: 12px 16px;">
        <ion-chip *ngFor="let tag of editTags" color="primary" [outline]="true">
          <ion-label>{{ tag }}</ion-label>
          <ion-icon name="close" (click)="removeTag(tag)"></ion-icon>
        </ion-chip>
      </div>

      <div style="display: flex; gap: 12px; margin-top: 16px;">
        <ion-button fill="outline" (click)="cancelEdit()" [disabled]="isSaving">Cancel</ion-button>
        <ion-button expand="block" (click)="saveEdit()" [disabled]="isSaving" style="flex: 1;">
          <ion-spinner *ngIf="isSaving" name="crescent" slot="start"></ion-spinner>
          Save
        </ion-button>
      </div>
    </div>

  </div>
</ion-content>
