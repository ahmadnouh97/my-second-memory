<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Memory Assistant</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content style="--padding-bottom: 80px;">

  <div style="padding: 12px;">
    <div
      *ngFor="let msg of messages"
      style="margin-bottom: 16px;"
      [style.text-align]="msg.role === 'user' ? 'right' : 'left'"
    >

      <!-- User bubble -->
      <div
        *ngIf="msg.role === 'user'"
        style="
          display: inline-block;
          max-width: 80%;
          background: var(--ion-color-primary);
          color: white;
          padding: 10px 14px;
          border-radius: 18px 18px 4px 18px;
          font-size: 0.95rem;
          line-height: 1.4;
          text-align: left;
        "
      >
        {{ msg.content }}
      </div>

      <!-- Assistant bubble -->
      <div *ngIf="msg.role === 'assistant'" style="text-align: left;">
        <div
          style="
            display: inline-block;
            max-width: 90%;
            background: var(--ion-color-step-50, #f4f5f8);
            padding: 10px 14px;
            border-radius: 18px 18px 18px 4px;
            font-size: 0.95rem;
            line-height: 1.5;
            white-space: pre-wrap;
          "
        >
          <span *ngIf="msg.content">{{ msg.content }}</span>
          <ion-spinner *ngIf="!msg.content && isStreaming" name="dots" style="width: 24px; height: 14px;"></ion-spinner>
        </div>

        <!-- Referenced items -->
        <div *ngIf="msg.items && msg.items.length" style="margin-top: 8px; max-width: 90%;">
          <app-chat-item-widget
            *ngFor="let item of msg.items"
            [item]="item"
          ></app-chat-item-widget>
        </div>
      </div>

    </div>
  </div>

</ion-content>

<ion-footer>
  <ion-toolbar style="padding: 4px 8px;">
    <ion-item lines="none" style="--border-radius: 24px; --background: var(--ion-color-step-50);">
      <ion-input
        [(ngModel)]="inputText"
        placeholder="Ask about your saved content..."
        (keyup.enter)="send()"
        [disabled]="isStreaming"
      ></ion-input>
      <ion-button slot="end" fill="clear" (click)="send()" [disabled]="!inputText.trim() || isStreaming">
        <ion-icon slot="icon-only" name="send" color="primary"></ion-icon>
      </ion-button>
    </ion-item>
  </ion-toolbar>
</ion-footer>
