<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Second Memory</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="goToChat()">
        <ion-icon slot="icon-only" name="chatbubble-ellipses"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
  <ion-toolbar>
    <ion-searchbar
      [(ngModel)]="searchQuery"
      (ionInput)="onSearchInput($event)"
      placeholder="Search your memory..."
      debounce="0"
      animated
    ></ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="refresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <!-- Filter bar -->
  <app-filter-bar
    [allTags]="allTags"
    (filterChanged)="onFilterChanged($event)"
  ></app-filter-bar>

  <!-- Loading state -->
  <div *ngIf="isLoading" style="display: flex; justify-content: center; padding: 32px;">
    <ion-spinner></ion-spinner>
  </div>

  <!-- Empty state -->
  <div
    *ngIf="!isLoading && items.length === 0"
    style="display: flex; flex-direction: column; align-items: center; padding: 64px 24px; gap: 16px; text-align: center;"
  >
    <ion-icon name="add" style="font-size: 64px; color: var(--ion-color-medium);"></ion-icon>
    <p style="color: var(--ion-color-medium); font-size: 1rem;">
      {{ searchQuery ? 'No results found' : 'No saved items yet. Tap + to add your first one.' }}
    </p>
  </div>

  <!-- Item list -->
  <app-item-card
    *ngFor="let item of items"
    [item]="item"
    [showDelete]="true"
    (deleted)="onDeleteItem($event)"
  ></app-item-card>

  <!-- Infinite scroll -->
  <ion-infinite-scroll [disabled]="!hasMore || !!searchQuery" (ionInfinite)="loadMore($event)">
    <ion-infinite-scroll-content loadingText="Loading more..."></ion-infinite-scroll-content>
  </ion-infinite-scroll>
</ion-content>

<!-- FAB: Add item -->
<ion-fab slot="fixed" vertical="bottom" horizontal="end">
  <ion-fab-button routerLink="/add-item" color="primary">
    <ion-icon name="add"></ion-icon>
  </ion-fab-button>
</ion-fab>
