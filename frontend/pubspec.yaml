name: second_memory
description: "Second Memory — save URLs, AI summaries, semantic search, and chat."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking
  http: ^1.4.0

  # Models (immutable + JSON)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Images
  cached_network_image: ^3.4.1

  # Animations
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0

  # Android share intent
  receive_sharing_intent: ^1.8.0

  # Open URLs
  url_launcher: ^6.3.1

  # Icons
  cupertino_icons: ^1.0.8

  # Fonts (loaded from Google CDN on web, bundled on Android)
  google_fonts: ^6.2.1

  # SVG rendering
  flutter_svg: ^2.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  # Android adaptive icon (API 26+)
  android: true
  adaptive_icon_background: "#0A0E27"   # AppColors.background
  adaptive_icon_foreground: "assets/icon_foreground.png"
  # Fallback round icon for older Android
  image_path: "assets/icon.png"
  # Web
  web:
    generate: true
    image_path: "assets/icon.png"
    background_color: "#0A0E27"
    theme_color: "#6366F1"

flutter:
  uses-material-design: true

  assets:
    - assets/logo.svg
    - assets/icon.png
    - assets/icon_foreground.png
